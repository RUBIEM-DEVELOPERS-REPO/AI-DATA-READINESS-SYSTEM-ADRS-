name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
  push:
    branches: ["dev", "main"]
    paths:
      - "frontend/**"

jobs:
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint (recommended)
        run: |
          cd frontend
          npm run lint

      - name: Typecheck (recommended)
        run: |
          cd frontend
          npm run typecheck

      - name: Run tests
        run: |
          cd frontend
          npm test -- --watchAll=false
